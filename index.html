
<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Static Three.js Cube</title>
    <style>
      body { margin: 0; }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script>
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(2, 1.7, 10);

      const renderer = new THREE.WebGLRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const rows = 5;
      const cols = 5;
      for (let i = 0; i < rows * cols; i++) {
        const cube = new THREE.Mesh(new THREE.BoxGeometry(), new THREE.MeshBasicMaterial({ color: 0x00ff00 }));
        cube.position.x = Math.floor(i / cols);
        cube.position.z = i % cols;
        scene.add(cube);
      }

      function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
      }
      animate();

      window.addEventListener("keydown", (e) => {
        if (e.key === "s") camera.position.z += 1;
        if (e.key === "w") camera.position.z -= 1;
        if (e.key === "a") camera.position.x -= 1;
        if (e.key === "d") camera.position.x += 1;
      });
    </script>
  </body>
</html>`;
